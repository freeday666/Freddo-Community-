<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inloggen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        #welcome {
            display: none;
        }
        form {
            max-width: 300px;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 8px 16px;
        }
    </style>
</head>
<body>

<h2>Inloggen</h2>
<div id="login-form">
    <form id="form">
        <label for="username">Gebruikersnaam:</label><br>
        <input type="text" id="username" required><br>
        <label for="password">Wachtwoord:</label><br>
        <input type="password" id="password" required><br>
        <button type="submit">Inloggen</button>
    </form>
</div>

<div id="welcome">
    <h2>Welkom, <span id="user"></span>!</h2>
    <button id="logout">Uitloggen</button>
</div>

<script>
    // Check of gebruiker al ingelogd is
    const storedUser = localStorage.getItem('user');
    if (storedUser) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('welcome').style.display = 'block';
        document.getElementById('user').textContent = storedUser;
    }

    document.getElementById('form').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Voor demo: controleer op vaste gebruikersnaam/wachtwoord
        if (username === 'test' && password === 'test123') {
            localStorage.setItem('user', username);
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('welcome').style.display = 'block';
            document.getElementById('user').textContent = username;
        } else {
            alert('Onjuiste gebruikersnaam of wachtwoord');
        }
    });

    document.getElementById('logout').addEventListener('click', function() {
        localStorage.removeItem('user');
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('form').reset();
    });
</script>

</body>
</html>
