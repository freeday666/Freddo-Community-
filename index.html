<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Discord User ID Checker</title>
<style>
  body { font-family: Arial, sans-serif; background: #2c2f33; color: #fff; margin:0; padding:20px; }
  #checker { max-width: 600px; margin: auto; padding:20px; background:#23272a; border-radius:8px; }
  input { width: calc(100% - 20px); padding:10px; margin-bottom:10px; border:none; border-radius:4px; }
  button { padding:10px 20px; border:none; border-radius:4px; background:#7289da; color:#fff; cursor:pointer; }
  #result { margin-top:20px; background:#2c2f33; padding:10px; border-radius:8px; }
</style>
</head>
<body>

<div id="checker">
  <h2>Discord User ID Checker</h2>
  <input type="text" id="discordId" placeholder="Voer Discord ID in" />
  <button onclick="checkUser()">Check User</button>
  
  <div id="result"></div>
</div>

<script>
function checkUser() {
  const userId = document.getElementById('discordId').value.trim();
  if(!userId) {
    alert('Voer een Discord ID in');
    return;
  }

  // Hier moet je je backend API URL invullen
  fetch('https://jouw-backend-api.com/getDiscordUser', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ id: userId })
  })
  .then(res => res.json())
  .then(data => {
    if(data.error) {
      document.getElementById('result').innerHTML = `<p style="color:red;">${data.error}</p>`;
    } else {
      // Toon info
      document.getElementById('result').innerHTML = `
        <h3>Gebruiker Informatie</h3>
        <p><strong>Naam:</strong> ${data.username}#${data.discriminator}</p>
        <p><strong>ID:</strong> ${data.id}</p>
        <p><strong>Bot:</strong> ${data.bot ? 'Ja' : 'Nee'}</p>
        <p><strong>Avatar:</strong> <img src="${data.avatar_url}" width="50" /></p>
        <!-- Voeg meer info toe zoals roles, status, etc. als beschikbaar -->
      `;
    }
  })
  .catch(err => {
    document.getElementById('result').innerHTML = `<p style="color:red;">Fout bij ophalen gegevens</p>`;
  });
}
</script>

</body>
</html>
