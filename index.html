<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freddo OS | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #94a3b8; font-family: 'Courier New', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-box" class="glass p-8 rounded-lg neon-border w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold mb-6 text-white tracking-widest uppercase">Freddo Auth</h2>
        <input type="text" id="username" placeholder="USER" class="w-full mb-4 p-3 bg-black border border-slate-700 text-blue-400">
        <input type="password" id="password" placeholder="PASS" class="w-full mb-6 p-3 bg-black border border-slate-700 text-blue-400">
        <button onclick="checkLogin()" class="w-full bg-blue-900 hover:bg-blue-700 text-white p-3 font-bold transition">EXECUTE LOGIN</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-4xl">
        <div class="glass p-6 rounded-lg neon-border">
            <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                <h1 class="text-xl font-bold text-blue-400 text-white tracking-tighter">> DATABASE_ACCESS_GRANTED</h1>
                <span class="text-xs text-slate-500">SYSTEM v3.1.0</span>
            </div>

            <div class="mb-8 flex gap-2">
                <input type="text" id="search-id" placeholder="Voer User ID in (bijv. 1234)..." class="flex-1 p-3 bg-black border border-blue-900 text-blue-400 focus:outline-none">
                <button onclick="searchUser()" class="bg-blue-600 text-white px-6 hover:bg-blue-500 font-bold">ZOEK</button>
            </div>

            <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 animate-pulse">
                <div class="p-4 bg-slate-900 border border-slate-800">
                    <h3 class="text-blue-400 mb-2">Locatie & IP</h3>
                    <p id="res-ip">IP: --</p>
                    <p id="res-geo">Stad: --</p>
                    <p id="res-address" class="text-red-400 text-xs mt-2 italic">Adres: Privé (Provider Locked)</p>
                </div>
                <div class="p-4 bg-slate-900 border border-slate-800">
                    <h3 class="text-blue-400 mb-2">Cheat Detectie</h3>
                    <p id="res-hacks">Hacks: --</p>
                    <p id="res-discord">Discord: --</p>
                </div>
            </div>
            
            <p id="not-found" class="hidden text-red-500 text-center font-bold">USER_ID_NOT_FOUND IN DATABASE</p>
        </div>
    </div>

    <script>
        // Nep-database van gebruikers
        const userDb = {
            "1234": { ip: "185.20.44.11", city: "Amsterdam", hacks: "Aimbot.exe, Speedhack", discord: "Server: Freddo-Army" },
            "5678": { ip: "92.110.12.5", city: "Rotterdam", hacks: "Geen", discord: "Server: Gaming-NL" },
            "9999": { ip: "213.45.1.99", city: "Utrecht", hacks: "Wallhack detected", discord: "Server: Chill-Zone" }
        };

        function checkLogin() {
            if(document.getElementById('username').value === "freddo" && document.getElementById('password').value === "administratie") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        }

        function searchUser() {
            const id = document.getElementById('search-id').value;
            const resDiv = document.getElementById('results');
            const notFound = document.getElementById('not-found');

            if(userDb[id]) {
                resDiv.classList.remove('hidden');
                notFound.classList.add('hidden');
                
                document.getElementById('res-ip').innerText = "IP: " + userDb[id].ip;
                document.getElementById('res-geo').innerText = "Stad: " + userDb[id].city;
                document.getElementById('res-hacks').innerText = "Status: " + userDb[id].hacks;
                document.getElementById('res-discord').innerText = "Discord: " + userDb[id].discord;
            } else {
                resDiv.classList.add('hidden');
                notFound.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
