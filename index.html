<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Discord Bot Control</title>
</head>
<body>
    <h1>Discord Bot beheer</h1>
    <p>Voer je bot token in om verbinding te maken:</p>
    <input type="text" id="token" placeholder="Bot Token" size="50"/>
    <button onclick="startBot()">Start Bot</button>
    <p id="status"></p>

    <script>
        function startBot() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('Voer je bot token in!');
                return;
            }

            fetch('http://10.1.248.72:8080/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ token: token }),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerText = data.message || 'Bot gestart!';
            })
            .catch((error) => {
                console.error('Error:', error);
                document.getElementById('status').innerText = 'Fout bij starten van de bot.';
            });
        }
    </script>
</body>
</html>
