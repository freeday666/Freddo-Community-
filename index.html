<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Discord Bot Chat Sender</title>
</head>
<body>
<h1>Stuur bericht naar Discord kanaal</h1>
<textarea id="message" rows="4" cols="50" placeholder="Typ je bericht..."></textarea><br>
<button onclick="sendMessage()">Verstuur</button>

<script>
function sendMessage() {
    const message = document.getElementById('message').value;
    fetch('/send', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === 'success') {
            alert('Bericht verzonden!');
        } else {
            alert('Fout: ' + data.status);
        }
    });
}
</script>
</body>
</html>
