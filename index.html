<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Bot Panel JS</title>
<style>
  body { font-family: Arial, sans-serif; background: #222; color: #eee; padding: 20px; }
  h1 { text-align: center; }
  .container { max-width: 800px; margin: auto; }
  input[type=text] { width: 100%; padding: 10px; margin: 5px 0; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  .status { margin-top: 10px; font-weight: bold; }
  .commands { margin-top: 20px; }
  .command { padding: 10px; background: #333; margin-top: 5px; display: flex; align-items: center; justify-content: space-between; }
  .command span { margin-left: 10px; }
</style>
</head>
<body>

<h1>Discord Bot Panel Demo (JS)</h1>
<div class="container">

<h2>Bot Token</h2>
<input type="text" id="tokenInput" placeholder="Voer je Discord Bot Token in" />
<button id="saveTokenBtn">Opslaan Token</button>
<div class="status" id="botStatus"></div>

<h2>Bot Actief / Stoppen</h2>
<button id="startBotBtn">Start Bot</button>
<button id="stopBotBtn">Stop Bot</button>

<h2>Commands Beheren</h2>
<div class="commands">
  <div class="command">
    <div><strong>!checkcheater</strong></div>
    <button onclick="toggleCommand('checkcheater')">Toggle</button>
    <span id="checkcheater-status"></span>
  </div>
  <div class="command">
    <div><strong>!autoMod</strong></div>
    <button onclick="toggleCommand('autoMod')">Toggle</button>
    <span id="autoMod-status"></span>
  </div>
  <!-- Voeg meer commands toe indien nodig -->
</div>

</div>

<script>
const STORAGE_KEY = 'discordBotDemo';

// Laad data uit localStorage of init
function loadData() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    token: '',
    botRunning: false,
    commands: {
      checkcheater: false,
      autoMod: false,
    }
  };
  return data;
}

// Sla data op in localStorage
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// Update UI op basis van opgeslagen data
function updateUI() {
  const data = loadData();
  document.getElementById('tokenInput').value = data.token;
  document.getElementById('botStatus').innerText = data.botRunning ? 'Bot is ACTIEF' : 'Bot is STOPPEN';

  document.getElementById('checkcheater-status').innerText = data.commands.checkcheater ? 'Aan' : 'Uit';
  document.getElementById('autoMod-status').innerText = data.commands.autoMod ? 'Aan' : 'Uit';
}

// Opslaan token
document.getElementById('saveTokenBtn').onclick = () => {
  const token = document.getElementById('tokenInput').value.trim();
  const data = loadData();
  data.token = token;
  saveData(data);
  alert('Token opgeslagen!');
};

// Start bot
document.getElementById('startBotBtn').onclick = () => {
  const data = loadData();
  data.botRunning = true;
  saveData(data);
  updateUI();
};

// Stop bot
document.getElementById('stopBotBtn').onclick = () => {
  const data = loadData();
  data.botRunning = false;
  saveData(data);
  updateUI();
};

// Toggle command
function toggleCommand(command) {
  const data = loadData();
  data.commands[command] = !data.commands[command];
  saveData(data);
  updateUI();
}

// Bij laden pagina
updateUI();
</script>

</body>
</html>
