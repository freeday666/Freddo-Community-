<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gratis Game Hosting</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
  }
  form {
    background: #fff;
    padding: 20px;
    margin-bottom: 30px;
    border-radius: 8px;
  }
  input[type="text"], input[type="file"] {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
  }
  button {
    padding: 10px 20px;
    background-color: #2e86de;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .game-list {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }
  .game {
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    width: 200px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Gratis Game Hosting</h1>

<form id="uploadForm">
  <h2>Upload je game</h2>
  <input type="text" id="gameName" placeholder="Naam van de game" required />
  <input type="file" id="gameFile" accept=".html,.zip" required />
  <button type="submit">Uploaden</button>
</form>

<h2>Gepubliceerde games</h2>
<div class="game-list" id="gameList">
  <!-- Hier komen de games te staan -->
</div>

<script>
  const form = document.getElementById('uploadForm');
  const gameList = document.getElementById('gameList');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('gameName').value;
    const fileInput = document.getElementById('gameFile');
    const file = fileInput.files[0];

    if (!file) return;

    // Hier zou je normaal uploaden naar server, maar voor demo voegen we het toe aan de lijst
    const reader = new FileReader();

    reader.onload = function(e) {
      const gameDiv = document.createElement('div');
      gameDiv.className = 'game';

      // Als het een HTML bestand is, embed het
      if (file.name.endsWith('.html')) {
        gameDiv.innerHTML = `<h3>${name}</h3><iframe src="${URL.createObjectURL(file)}" width="180" height="150"></iframe>`;
      } else {
        // Voor zip of andere files, link naar download
        const url = URL.createObjectURL(file);
        gameDiv.innerHTML = `<h3>${name}</h3><a href="${url}" target="_blank">Download game</a>`;
      }

      gameList.appendChild(gameDiv);
    };

    reader.readAsDataURL(file);
  });
</script>

</body>
</html>
