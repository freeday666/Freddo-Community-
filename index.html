<!DOCTYPE html>
<html lang="nl">
<head>
    <title>FiveM Admin Panel - Login</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: #34495e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Gebruikersnaam">
        <input type="password" id="pass" placeholder="Wachtwoord">
        <button onclick="checkLogin()">Inloggen</button>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if(user === "freddo" && pass === "admin") {
                alert("Welkom Freddo!");
                // Hier zou je doorsturen naar het paneel
            } else {
                alert("Foutieve gegevens!");
            }
        }
    </script>
</body>
</html>
