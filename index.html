<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Hosting Service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            margin-top: 0;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="text"], input[type="file"] {
            margin-top: 5px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        button:hover {
            background-color: #555;
        }
        .game-list {
            margin-top: 30px;
        }
        .game {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .game:last-child {
            border-bottom: none;
        }
        /* Responsive design */
        @media(max-width: 600px) {
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Game Hosting Service</h1>
    </header>

    <div class="container">
        <h2>Upload je game</h2>
        <form>
            <label for="gamenaam">Gamenaam:</label>
            <input type="text" id="gamenaam" name="gamenaam" placeholder="Naam van je game" />

            <label for="gamefile">Selecteer gamebestand:</label>
            <input type="file" id="gamefile" name="gamefile" />

            <button type="submit">Upload game</button>
        </form>

        <div class="game-list">
            <h2>Geüploade games</h2>
            <div class="game">
                <strong>Super Avontuur</strong> - 01-01-2024
            </div>
            <div class="game">
                <strong>Racekampioen</strong> - 02-01-2024
            </div>
            <div class="game">
                <strong> puzzelwereld</strong> - 03-01-2024
            </div>
        </div>
    </div>
</body>
</html>
