<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Discord Command Panel</title>
<style>
  body { font-family: Arial, sans-serif; background: #222; color: #fff; padding: 20px; }
  #console { width: 100%; height: 300px; background: #000; padding: 10px; overflow-y: auto; }
  #input { width: 100%; padding: 10px; font-size: 16px; margin-top: 10px; }
</style>
</head>
<body>
<h1>Discord Command Panel</h1>
<div id="console"></div>
<input type="text" id="input" placeholder="Typ hier je commando..." />

<script>
const consoleDiv = document.getElementById('console');
const input = document.getElementById('input');

function logMessage(msg) {
  consoleDiv.innerHTML += msg + '<br>';
  consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

function sendCommand(command) {
  fetch('https://https://freddo-community.onrender.com/api/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: command })
  })
  .then(res => res.text())
  .then(text => logMessage('< ' + text))
  .catch(err => logMessage('Error: ' + err));
}

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    if (cmd) {
      logMessage('> ' + cmd);
      sendCommand(cmd);
      input.value = '';
    }
  }
});
</script>
</body>
</html>
