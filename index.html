<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProHost | Gratis Server Paneel</title>
    <style>
        :root { --p: #4f46e5; --bg: #020617; --c: #1e293b; --t: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); margin: 0; }
        
        nav { background: #0f172a; padding: 1rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 15px; cursor: pointer; }
        
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .section { display: none; }
        .active { display: block; }

        .card { background: var(--c); padding: 2rem; border-radius: 12px; border: 1px solid #334155; margin-bottom: 1rem; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .btn { background: var(--p); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #4338ca; }
        .btn:disabled { background: #475569; cursor: not-allowed; }

        .price-tag { font-size: 1.5rem; color: #22c55e; margin: 10px 0; font-weight: bold; }
        .server-item { background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--p); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; color: var(--p);">PROHOST FREE</div>
    <div class="nav-links">
        <a onclick="show('store')">Winkel</a>
        <a onclick="show('dash')">Mijn Servers</a>
        <a id="user-display" onclick="show('login')" style="color:white;">Inloggen</a>
    </div>
</nav>

<div class="container">

    <div id="store" class="section active">
        <h1>Beschikbare Servers</h1>
        <div class="card">
            <h3>Minecraft Free Node</h3>
            <p>2GB RAM | 100% Gratis</p>
            <div class="price-tag">€0.00</div>
            <button class="btn" id="buy-btn" onclick="claimServer('Minecraft Free')">Nu Claimen</button>
            <p id="lock-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px;">Je moet ingelogd zijn om te claimen.</p>
        </div>
    </div>

    <div id="login" class="section">
        <h1>Account Beheer</h1>
        <div class="card" id="login-form">
            <h3>Maak een account</h3>
            <input type="text" id="username" placeholder="Gebruikersnaam">
            <input type="email" placeholder="E-mailadres">
            <input type="password" id="password" placeholder="Wachtwoord">
            <button class="btn" onclick="doLogin()">Account Aanmaken & Inloggen</button>
        </div>
        <div id="welcome-msg" class="card" style="display:none;">
            <h3 id="hi-name"></h3>
            <button class="btn" style="background:#ef4444;" onclick="doLogout()">Uitloggen</button>
        </div>
    </div>

    <div id="dash" class="section">
        <h1>Jouw Dashboard</h1>
        <div id="server-container">
            <p style="color:#94a3b8;">Je hebt nog geen actieve servers.</p>
        </div>
    </div>

</div>

<script>
    let user = localStorage.getItem('gh_user');
    let myServers = JSON.parse(localStorage.getItem('gh_servers')) || [];

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        refresh();
    }

    function doLogin() {
        const name = document.getElementById('username').value;
        if(name.length < 2) return alert("Kies een naam");
        localStorage.setItem('gh_user', name);
        user = name;
        show('store');
        alert("Welkom " + name + "! Je kunt nu je gratis server claimen.");
    }

    function doLogout() {
        localStorage.removeItem('gh_user');
        user = null;
        location.reload();
    }

    function claimServer(type) {
        if(!user) {
            alert("Je moet eerst inloggen!");
            show('login');
            return;
        }
        const srv = { id: Math.floor(Math.random()*9999), type: type, date: new Date().toLocaleDateString() };
        myServers.push(srv);
        localStorage.setItem('gh_servers', JSON.stringify(myServers));
        alert("Gefeliciteerd! Je " + type + " server wordt nu gestart.");
        show('dash');
    }

    function refresh() {
        // Update Buttons & Lock message
        const btn = document.getElementById('buy-btn');
        const msg = document.getElementById('lock-msg');
        const userTag = document.getElementById('user-display');

        if(user) {
            btn.disabled = false;
            msg.style.display = 'none';
            userTag.innerText = "Dashboard (" + user + ")";
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('welcome-msg').style.display = 'block';
            document.getElementById('hi-name').innerText = "Hallo, " + user;
        } else {
            btn.disabled = true;
            msg.style.display = 'block';
        }

        // Render Dashboard
        const container = document.getElementById('server-container');
        if(myServers.length > 0) {
            container.innerHTML = myServers.map(s => `
                <div class="server-item">
                    <div>
                        <strong>${s.type}</strong><br>
                        <small style="color:#22c55e;">Status: Actief (ID: #${s.id})</small>
                    </div>
                    <button class="btn" style="width:auto; padding:5px 10px;" onclick="alert('Paneel opent...')">Open Console</button>
                </div>
            `).join('');
        }
    }

    refresh();
</script>

</body>
</html>
