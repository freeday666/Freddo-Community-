<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Discord Bot Control Panel</title>
<!-- Google Fonts voor een strakke uitstraling -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    min-height: 100vh;
    margin: 0;
    padding: 50px 20px;
    color: #333;
  }
  h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }
  .buttons {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }
  button {
    background-color: #fff;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 1.2em;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    transition: background 0.3s, transform 0.2s;
  }
  button:hover {
    background-color: #f0f0f0;
    transform: translateY(-2px);
  }
  #status {
    font-size: 1.4em;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
  }
  #responseBox {
    margin-top: 30px;
    padding: 20px;
    max-width: 700px;
    width: 100%;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    font-family: 'Roboto', sans-serif;
  }
  #response {
    white-space: pre-wrap;
    font-size: 1.1em;
  }
</style>
</head>
<body>

<h1>Discord Bot Beheer</h1>

<div class="buttons">
  <button onclick="startBot()">Start Bot</button>
  <button onclick="stopBot()">Stop Bot</button>
  <button onclick="fetchStatus()">Haal Status op</button>
</div>

<div id="status">Status: Nog niet verbonden</div>

<div id="responseBox">
  <h2>API Reactie</h2>
  <div id="response">Wacht op actie...</div>
</div>

<script>
  // Pas hier je API URL aan naar jouw hosting
  const apiBaseUrl = 'https://freddohosting.onrender.com'; // JOUW API URL

  async function startBot() {
    updateStatus('Bezig met starten...');
    const response = await fetch(`${apiBaseUrl}/start`);
    const data = await response.json();
    updateResponse(data.message || 'Bot gestart!');
    fetchStatus();
  }

  async function stopBot() {
    updateStatus('Bezig met stoppen...');
    const response = await fetch(`${apiBaseUrl}/stop`);
    const data = await response.json();
    updateResponse(data.message || 'Bot gestopt!');
    fetchStatus();
  }

  async function fetchStatus() {
    updateStatus('Status wordt opgehaald...');
    const response = await fetch(`${apiBaseUrl}/status`);
    const data = await response.json();
    updateStatus(data.status || 'Onbekend');
  }

  function updateStatus(text) {
    document.getElementById('status').innerText = 'Status: ' + text;
  }

  function updateResponse(text) {
    document.getElementById('response').innerText = text;
  }
</script>

</body>
</html>
