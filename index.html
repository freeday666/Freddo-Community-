<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FiveM Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h1>🔐 Admin Login</h1>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
  <div class="sidebar">
    <h2>🎮 FiveM Panel</h2>
    <a href="#" onclick="showPage('dashboard')">Dashboard</a>
    <a href="#" onclick="showPage('servers')">Servers</a>
    <a href="#" onclick="showPage('players')">Players</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <div class="main">
    <div id="dashboard" class="page">
      <h1>📊 Dashboard</h1>
      <div class="card">
        <h3>Server Status</h3>
        <p id="status">🟢 Loading...</p>
      </div>
      <div class="card">
        <h3>Players Online</h3>
        <p id="playerCount">0</p>
      </div>
    </div>

    <div id="servers" class="page" style="display:none;">
      <h1>🎮 Server Control</h1>
      <div class="card">
        <button onclick="startServer()">Start</button>
        <button onclick="stopServer()">Stop</button>
        <button onclick="restartServer()">Restart</button>
      </div>
    </div>

    <div id="players" class="page" style="display:none;">
      <h1>👥 Players</h1>
      <div id="playerList"></div>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:3000"; // Vul hier je backend URL in (lokal of VPS)

// NAVIGATION
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

// LOGIN
function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  if(user==="admin" && pass==="admin"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("panel").style.display="block";
    loadPlayers();
    loadServerStatus();
  } else {
    document.getElementById("error").innerText="Wrong credentials!";
  }
}
function logout(){ location.reload(); }

// SERVER CONTROL
async function startServer(){
  const res = await fetch(API+"/server/start/1",{method:"POST"});
  const data = await res.json();
  document.getElementById("status").innerText="🟢 Online";
  alert(data.message);
}
async function stopServer(){
  const res = await fetch(API+"/server/stop/1",{method:"POST"});
  const data = await res.json();
  document.getElementById("status").innerText="🔴 Offline";
  alert(data.message);
}
async function restartServer(){
  const res = await fetch(API+"/server/restart/1",{method:"POST"});
  const data = await res.json();
  document.getElementById("status").innerText="🟡 Restarting";
  setTimeout(()=>document.getElementById("status").innerText="🟢 Online",1500);
}

// PLAYERS
async function loadPlayers(){
  try{
    const res = await fetch(API+"/players");
    const players = await res.json();
    const div = document.getElementById("playerList");
    div.innerHTML="";
    players.forEach(p=>{
      const el = document.createElement("div");
      el.className="card";
      el.innerHTML=`${p.name} <button onclick="kick(${p.id})">Kick</button> <button onclick="ban(${p.id})">Ban</button>`;
      div.appendChild(el);
    });
    document.getElementById("playerCount").innerText = players.length;
  } catch(err){
    console.error(err);
    document.getElementById("playerCount").innerText="0";
  }
}
async function kick(id){
  const res = await fetch(API+"/kick/"+id,{method:"POST"});
  const data = await res.json();
  alert(data.message);
  loadPlayers();
}
async function ban(id){
  const res = await fetch(API+"/ban/"+id,{method:"POST"});
  const data = await res.json();
  alert(data.message);
  loadPlayers();
}

// SERVER STATUS
async function loadServerStatus(){
  const res = await fetch(API+"/servers");
  const servers = await res.json();
  if(servers.length>0){
    document.getElementById("status").innerText = servers[0].status;
  }
}
</script>

</body>
</html>
